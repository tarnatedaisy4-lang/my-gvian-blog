<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GVIAN BLOG | Daisy Tarnate</title>
    <style>
        body { 
            background-color: #0f0f0f; color: white; margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
        }
        .header { text-align: center; padding: 60px 20px; }
        .header h1 { font-size: 2.5em; color: #d4af37; margin-bottom: 5px; }
        
        /* The Vertical Feed */
        .feed { 
            width: 90%; max-width: 600px; 
            display: flex; flex-direction: column; gap: 30px; 
        }

        .card {
            background: #1a1a1a; padding: 12px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            border: 1px solid #333;
        }

        img { width: 100%; border-radius: 12px; display: block; }

        .footer { padding: 80px 0 120px 0; text-align: center; }
        .btn {
            background: linear-gradient(45deg, #d4af37, #f1c40f);
            color: black; padding: 18px 50px; text-decoration: none;
            border-radius: 50px; font-weight: bold; transition: 0.3s;
            display: inline-block; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
        }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(212, 175, 55, 0.6); }
    </style>
</head>
<body>

    <div class="header">
        <h1>My GVIAN BLOG</h1>
        <p>A Journey through Design | 12-Zest</p>
    </div>

    <div class="feed">
        <div class="card"><img src="1.gif.gif"></div>
        <div class="card"><img src="2.gif.gif"></div>
        <div class="card"><img src="3.gif.gif"></div>
        <div class="card"><img src="4.gif.gif"></div>
        <div class="card"><img src="5.gif.gif"></div>
        <div class="card"><img src="6.gif.gif"></div>
        <div class="card"><img src="7.gif.gif"></div>
        <div class="card"><img src="8.gif.gif"></div>
        <div class="card"><img src="9.gif.gif"></div>
        <div class="card"><img src="10.gif.gif"></div>
    </div>

    <div class="footer">
        <a href="jar.html" class="btn">Click for a Surprise →</a>
    </div>

</body>
</html>
