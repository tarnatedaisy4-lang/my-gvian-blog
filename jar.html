<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GVIAN Memory Jar</title>
    <style>
        /* General Setup */
        body { 
            background: #0a0a0a; color: white; font-family: 'Georgia', serif; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; min-height: 100vh; margin: 0; 
        }

        /* The Jar Graphic */
        .jar { 
            width: 240px; height: 300px; 
            border: 4px solid rgba(255,255,255,0.3); 
            border-radius: 20px 20px 80px 80px; 
            position: relative; 
            background: rgba(255,255,255,0.05); 
            display: flex; flex-wrap: wrap; 
            justify-content: center; align-items: flex-end; 
            padding: 15px; 
        }
        .jar::before { 
            content: ''; position: absolute; top: -18px; 
            width: 140px; height: 22px; background: #5d4037; border-radius: 5px; 
        }

        /* The Paper Notes inside the Jar */
        .paper-scrap { 
            width: 35px; height: 45px; background: #fff9c4; margin: 4px; 
            cursor: pointer; transition: 0.3s; border: 1px solid #d4af37; 
            transform: rotate(calc(var(--r, 0) * 1deg));
        }
        .paper-scrap:hover { transform: translateY(-20px) scale(1.1); background: #fff; }
        
        /* Pop-up Windows (Overlays) */
        #writing-desk, #note-overlay { 
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: rgba(0,0,0,0.92); 
            z-index: 100; justify-content: center; align-items: center; 
        }
        .letter-box { 
            background: #fff9c4; color: #333; padding: 40px; 
            border-radius: 5px; text-align: center; max-width: 320px; 
            border: 2px dashed #d4af37; 
        }

        /* Buttons */
        .btn { 
            padding: 12px 28px; cursor: pointer; border: none; 
            border-radius: 5px; font-weight: bold; margin-top: 20px; 
        }
        .write-btn { background: #00c4cc; color: white; }
    </style>
</head>
<body>

    <h2>GVIAN Memory Jar</h2>
    <p style="color: #888; margin-bottom: 30px;">Tap a note to see the message</p>

    <div class="jar" id="the-jar">
        <div class="paper-scrap" style="--r: -10" onclick="showNote('Thank you 12-Zest')"></div>
        <div class="paper-scrap" style="--r: 5" onclick="showNote('Thank you ma\'am Michelle')"></div>
        <div class="paper-scrap" style="--r: 15" onclick="showNote('Thank you to all the teachers of Guisad Valley National High School')"></div>
        <div class="paper-scrap" style="--r: -5" onclick="showNote('Proud to be GVIAN')"></div>
        <div class="paper-scrap" style="--r: 20" onclick="showNote('I will do my best, travel, do my hobby, and pursue Electrical Engineering in college.')"></div>
        <div class="paper-scrap" style="--r: -15" onclick="showNote('Whatever we do, let\'s do our best!')"></div>
        <div class="paper-scrap" style="--r: 2" onclick="showNote('To God all the Glory!')"></div>
    </div>

    <button class="btn write-btn" onclick="openDesk()">Write something also</button>
    <a href="index.html" style="margin-top: 40px; color: #555; text-decoration: none;">← Back to Blog</a>

    <div id="writing-desk">
        <div style="background: white; padding: 30px; border-radius: 10px; color: black; text-align: center;">
            <h3>New Message</h3>
            <textarea id="user-input" style="width: 250px; height: 100px; padding: 10px;"></textarea><br>
            <button class="btn" onclick="sendToJar()" style="background: #5d4037; color: white;">Drop into Jar</button>
            <button class="btn" onclick="closeDesk()" style="background: #eee; margin-left: 10px;">Cancel</button>
        </div>
    </div>

    <div id="note-overlay" onclick="closeNote()">
        <div class="letter-box">
            <p id="note-text" style="font-size: 1.3em; line-height: 1.6;"></p>
            <small style="color: #999;">(Tap anywhere to close)</small>
        </div>
    </div>

    <script>
        // Shows the typing window
        function openDesk() { 
            document.getElementById('writing-desk').style.display = 'flex'; 
        }

        // Hides the typing window
        function closeDesk() { 
            document.getElementById('writing-desk').style.display = 'none'; 
        }

        // Shows the message pop-up
        function showNote(msg) { 
            document.getElementById('note-text').innerText = msg; 
            document.getElementById('note-overlay').style.display = 'flex'; 
        }

        // Hides the message pop-up
        function closeNote() { 
            document.getElementById('note-overlay').style.display = 'none'; 
        }

        // Adds your new note into the jar
        function sendToJar() {
            const val = document.getElementById('user-input').value;
            if(!val.trim()) return alert("Please type something first!");
            
            // Create a new paper element
            const p = document.createElement('div');
            p.className = 'paper-scrap';
            p.style.setProperty('--r', Math.random() * 40 - 20); // Random tilt
            p.onclick = function() { showNote(val); };
            
            // Drop it into the jar
            document.getElementById('the-jar').appendChild(p);
            
            // Clean up
            closeDesk();
            document.getElementById('user-input').value = "";
            alert("Your note has been added!");
        }
    </script>
</body>
</html>
